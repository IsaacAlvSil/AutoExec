global
    log stdout format raw local0
    maxconn 2000

defaults
    log global
    mode http
    option httplog
    option forwardfor
    timeout connect 5s
    timeout client 30s
    timeout server 30s

# Frontend for Web (Laravel)
frontend web_front
    bind *:80
    default_backend web_back

# Frontend for APIs (FastAPI)
frontend api_front
    bind *:8000
    default_backend api_back

# Backend definition for Web
backend web_back
    balance roundrobin
    option httpchk GET /
    server web1 web:80 check inter 5s rise 2 fall 3

# Backend definition for APIs
backend api_back
    balance roundrobin
    option httpchk GET /health
    server api1 api1:8000 check inter 5s rise 2 fall 3
    server api2 api2:8000 check inter 5s rise 2 fall 3

# Statistics page
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth admin:admin

# Prometheus metrics for HAProxy
frontend prometheus
    bind *:8405
    mode http
    http-request use-service prometheus-exporter
    no log
