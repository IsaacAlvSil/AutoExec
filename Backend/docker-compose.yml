version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: automotriz_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_v2:/var/lib/postgresql/data
    networks:
      - autoexec-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d automotriz_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: fastapi_app
    restart: always
    ports:
      - "5000:8000"
    environment:
      DATABASE_URL: postgresql://admin:123456@db:5432/automotriz_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - autoexec-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: laravel_web
    restart: always
    ports:
      - "8080:8000"
    environment:
      APP_NAME: "Automotive Recruitment Admin"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      API_BASE_URL: http://api:8000/api
      API_TIMEOUT: "30"
    depends_on:
      - api
    volumes:
      - ./web:/var/www/html
      - composer_cache:/root/.composer
    networks:
      - autoexec-net

volumes:
  postgres_data_v2:
  composer_cache:

networks:
  autoexec-net:


