# ================================================================
# AUTOEXEC — docker-compose.yml DEFINITIVO REFACCIÓN DEVOPS
# SERVICIOS:
#   - postgres       → Base de datos (puerto 5432)
#   - api1, api2     → API FastAPI desde Backend/ (puerto 8000 via haproxy)
#   - web            → Laravel desde Backend/web/ (puerto 8080)
#   - nginx          → Balanceador principal (puerto 80)
#   - haproxy        → Balanceo entre api1 y api2 (puerto 8000)
#   - prometheus     → Métricas (puerto 9090)
#   - grafana        → Dashboards (puerto 3000)
#   - portainer      → Gestión Docker (puerto 9000)
#   - crowdsec       → Firewall dinámico
#   - redis          → Caché
#   - postgres_exporter, node_exporter → Métricas de sistema
# ================================================================

version: '3.8'

services:

  # ── BASE DE DATOS ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: autoexec_postgres
    environment:
      POSTGRES_DB: autoexec
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
      - monitor_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d autoexec"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── API 1 — FastAPI (Backend/ real con todos los routers) ──────
  api1:
    build:
      context: ./Backend
      dockerfile: dockerfile
    container_name: autoexec_api1
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/autoexec
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── API 2 — FastAPI (segunda instancia para balanceo) ──────────
  api2:
    build:
      context: ./Backend
      dockerfile: dockerfile
    container_name: autoexec_api2
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://admin:password123@postgres:5432/autoexec
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── WEB — Laravel (Backend/web/ real con auth y reportes) ──────
  web:
    build:
      context: ./Backend/web
      dockerfile: Dockerfile
    container_name: autoexec_web
    ports:
      - "8080:80"
    environment:
      APP_NAME: AutoExec
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      API_BASE_URL: http://api1:8000
      API_TIMEOUT: "30"
    depends_on:
      - api1
      - api2
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── NGINX — Balanceador principal ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: autoexec_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      web:
        condition: service_healthy
      haproxy:
        condition: service_healthy
    networks:
      - frontend_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── HAPROXY — Balanceo entre api1 y api2 ──────────────────────
  haproxy:
    image: haproxy:2.9
    container_name: autoexec_haproxy
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8002:8000"
      - "8404:8404"
      - "8405:8405"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "haproxy -c -f /usr/local/etc/haproxy/haproxy.cfg || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── PROMETHEUS — Métricas ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: autoexec_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - backend_net
      - monitor_net
      - frontend_net
    restart: unless-stopped
    depends_on:
      api1:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── GRAFANA — Dashboards ───────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: autoexec_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_LOG_LEVEL: info
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitor_net
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── PORTAINER — Gestión Docker ─────────────────────────────────
  portainer:
    image: portainer/portainer-ce:latest
    container_name: autoexec_portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    networks:
      - monitor_net
    restart: unless-stopped

  # ── CROWDSEC — Firewall dinámico ───────────────────────────────
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: autoexec_crowdsec
    environment:
      GID: "1000"
      COLLECTIONS: "crowdsecurity/nginx crowdsecurity/whitelist-good-actors"
      LOG_LEVEL: "info"
    volumes:
      - crowdsec_db:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
      - /var/log:/var/log/host:ro
    networks:
      - frontend_net
      - backend_net
    restart: unless-stopped

  # ── REDIS — Caché ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: autoexec_redis
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── CADVISOR — Métricas de contenedores ─────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: autoexec_cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitor_net
    restart: unless-stopped

  # ── EXPORTADORES DE MÉTRICAS ───────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: autoexec_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://admin:password123@postgres:5432/autoexec?sslmode=disable"
    networks:
      - monitor_net
      - backend_net
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  node_exporter:
    image: prom/node-exporter:latest
    container_name: autoexec_node_exporter
    networks:
      - monitor_net
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  blackbox_exporter:
    image: prom/blackbox-exporter:latest
    container_name: autoexec_blackbox
    ports:
      - "9115:9115"
    networks:
      - monitor_net
      - frontend_net
      - backend_net
    restart: unless-stopped

  # ── LOKI — Almacenamiento de logs ──────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: autoexec_loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki.yml:/etc/loki/local-config.yaml:ro
    networks:
      - monitor_net
    restart: unless-stopped

  # ── ALERTMANAGER — Motor de alertas ────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: autoexec_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - monitor_net
    restart: unless-stopped

  # ── REDIS EXPORTER — Métricas de caché ─────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: autoexec_redis_exporter
    environment:
      REDIS_ADDR: "redis:6379"
    networks:
      - backend_net
      - monitor_net
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # ── PROMTAIL — Recolector de logs ──────────────────────────────
  promtail:
    image: grafana/promtail:latest
    container_name: autoexec_promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitor_net
    restart: unless-stopped
    depends_on:
      - loki

# ── VOLÚMENES ─────────────────────────────────────────────────────
volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  crowdsec_db:
  crowdsec_config:
  portainer_data:
  redis_data:

# ── REDES ───────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitor_net:
    driver: bridge
